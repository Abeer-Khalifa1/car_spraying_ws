# Joint States (Gazebo → ROS 2) to be read by RVIZ and MoveIt
- ros_topic_name: "/joint_states"
  gz_topic_name: "/world/world_demo/joint_state"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS
 
# Velocity Control (ROS 2 → Gazebo)
- ros_topic_name: "/cmd_vel"
  gz_topic_name: "/model/car_spraying_robot/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "/joint_trajectory_controller/joint_trajectory"
  gz_topic_name: "/model/car_spraying_robot/joint_trajectory"
  ros_type_name: "trajectory_msgs/msg/JointTrajectory"
  gz_type_name: "gz.msgs.JointTrajectory"
  direction: ROS_TO_GZ
 
# Camera (Gazebo → ROS 2) 
- ros_topic_name: "/camera/image_raw"
  gz_topic_name: "/world/default/model/car_spraying_robot/sensor/camera/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: BIDIRECTIONAL

- ros_topic_name: "/clock"
  gz_topic_name: "/world/world_demo/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS
    
- service_name: "/world/world_demo/create"
  ros_type_name: "ros_gz_interfaces/srv/SpawnEntity"
  gz_req_type_name: "gz.msgs.EntityFactory"
  gz_rep_type_name: "gz.msgs.Boolean"
  direction: ROS_TO_GZ
